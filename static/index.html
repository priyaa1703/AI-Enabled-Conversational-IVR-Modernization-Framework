<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>IVR Web Simulator</title>
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="card">
    <h1>🎧 IVR Web Simulator</h1>
    <textarea id="text" placeholder="Type or speak (e.g. 'book a flight')"></textarea>
    <div class="controls">
      <button id="sendBtn">Send</button>
      <button id="micBtn">🎤 Speak</button>
    </div>
    <div id="responseArea">
      <h3>Response</h3>
      <div id="responseText">No response yet</div>
    </div>
  </div>
<script src="/static/script.js"></script>
</body>
</html>
